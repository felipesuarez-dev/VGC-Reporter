<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preload" as="image" href="/logo.png" fetchpriority="high" />
    <title>VGC Reporter</title>
    <style>
      #splash {
        position: fixed;
        inset: 0;
        background: #020617;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #e2e8f0;
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }
      #splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      #splash img {
        width: 96px;
        height: 96px;
        border-radius: 50%;
        margin-bottom: 16px;
      }
      #splash .title {
        font-size: 28px;
        font-weight: 700;
        letter-spacing: -0.02em;
      }
      #splash .tag {
        font-size: 14px;
        color: #94a3b8;
        margin-top: 4px;
      }
      #splash .spinner {
        margin-top: 24px;
        width: 32px;
        height: 32px;
        border: 3px solid #1e293b;
        border-top-color: #38bdf8;
        border-radius: 50%;
        animation: vgc-splash-spin 0.8s linear infinite;
      }
      @keyframes vgc-splash-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body class="bg-slate-950 text-slate-100">
    <div id="splash">
      <img src="/logo.png" alt="PumaSoft" decoding="sync" loading="eager" fetchpriority="high" />
      <div class="title">VGC Reporter</div>
      <div class="tag">Pokémon Champions · VGC 2026</div>
      <div class="spinner"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
