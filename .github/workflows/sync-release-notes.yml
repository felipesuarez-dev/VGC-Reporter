name: Sync Release Notes to latest.json

on:
  release:
    types: [published, edited]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (leave empty to use the latest release)'
        required: false
  push:
    branches: [main]
    paths:
      - '.github/workflows/sync-release-notes.yml'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    if: github.event_name != 'release' || github.event.release.draft == false
    steps:
      - name: Resolve tag
        id: rel
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          EVENT_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [ -n "$EVENT_TAG" ]; then
            TAG="$EVENT_TAG"
          elif [ -n "$INPUT_TAG" ]; then
            TAG="$INPUT_TAG"
          else
            TAG=$(gh release list --repo "$REPO" --limit 1 --json tagName -q '.[0].tagName')
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $TAG"

      - name: Fetch release body and update latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ steps.rel.outputs.tag }}
        run: |
          gh release view "$TAG" --repo "$REPO" --json body -q .body > release_body.txt
          gh release download "$TAG" --repo "$REPO" --pattern "latest.json" --output latest.json
          python3 -c "import json; d=json.load(open('latest.json')); d['notes']=open('release_body.txt').read(); json.dump(d,open('latest.json','w'),indent=2)"
          gh release upload "$TAG" latest.json --repo "$REPO" --clobber
          echo "Synced latest.json notes for $TAG"
