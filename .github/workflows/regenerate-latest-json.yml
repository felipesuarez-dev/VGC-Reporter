name: Regenerate latest.json

# Standalone recovery workflow for the case where a release's bundles uploaded
# successfully but its `latest.json` (consumed by the Tauri auto-updater) did
# not. Reads the .sig files already attached to the release, constructs a
# proper latest.json, and uploads it with --clobber.
#
# Origin incident: v0.2.3.20260517-beta. tauri-action's per-job `uploadVersionJSON`
# silently failed in `releaseId` mode for all 4 desktop matrix jobs. Android job
# then aborted because it tries to download an existing latest.json before
# injecting the android key. With this workflow we patch the release in ~30s
# instead of re-running the whole 40+ min build matrix.
#
# Limitation: Android. The android minisign `.sig` is generated by the release
# workflow's android job but never uploaded to the release (only the APK is).
# So this workflow can only reconstruct desktop platform keys. For android key
# coverage, see the companion fix in `.github/workflows/release.yml` that
# uploads the apk .sig.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag whose release needs latest.json regenerated (e.g. v0.2.3.20260517-beta)'
        required: true

permissions:
  contents: write

jobs:
  regen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download every .sig from the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag }}
        run: |
          set -e
          mkdir -p /tmp/sigs
          # gh release download accepts a glob; --skip-existing prevents
          # collisions if we re-run. Note: assets on GitHub have spaces in
          # filenames replaced with dots, so the local files are clean.
          gh release download "$TAG" --pattern '*.sig' --dir /tmp/sigs --skip-existing
          echo "--- downloaded sigs ---"
          ls -la /tmp/sigs/ || true

      - name: Build latest.json from sigs and current release metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          set -e
          # Fetch the release body so we keep release notes intact.
          BODY=$(gh release view "$TAG" --json body --jq '.body')
          export BODY
          export VERSION="${TAG#v}"
          # Strip the .NNNNNNNN-beta suffix from version so the Tauri updater's
          # semver comparison sees just X.Y.Z. (Tauri's updater plugin checks
          # `version` against the installed APP_VERSION's leading semver.)
          export SEMVER_VERSION=$(echo "$VERSION" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+')
          export REPO_URL="https://github.com/${REPO}"
          export PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%S.000Z)

          python3 << 'PY'
          import os, base64, json, glob, re, urllib.parse

          tag = os.environ['TAG']
          version = os.environ['SEMVER_VERSION'] or os.environ['VERSION']
          body = os.environ.get('BODY', '')
          repo_url = os.environ['REPO_URL']
          pub_date = os.environ['PUB_DATE']

          def sig_b64(path: str) -> str:
              # The .sig files on disk are plain text (a minisign block). The
              # Tauri updater expects the field to be base64 of that text.
              with open(path, 'rb') as f:
                  return base64.b64encode(f.read()).decode('ascii')

          def url_for(asset_name: str) -> str:
              # GitHub serves asset names with spaces replaced by dots; our
              # local sig filenames already follow that convention, so the
              # binary name does too.
              return f"{repo_url}/releases/download/{urllib.parse.quote(tag, safe='.-')}/{urllib.parse.quote(asset_name, safe='._-')}"

          platforms: dict = {}

          # Windows MSI is the primary updater target (we set
          # updaterJsonPreferNsis: false in release.yml). Map both the
          # generic `windows-x86_64` and the explicit `-msi` variant to it.
          msi_sigs = sorted(glob.glob('/tmp/sigs/*.msi.sig'))
          if msi_sigs:
              sig_path = msi_sigs[0]
              binary = os.path.basename(sig_path)[:-4]
              entry = {'signature': sig_b64(sig_path), 'url': url_for(binary)}
              platforms['windows-x86_64'] = entry
              platforms['windows-x86_64-msi'] = entry

          nsis_sigs = sorted(glob.glob('/tmp/sigs/*-setup.exe.sig'))
          if nsis_sigs:
              sig_path = nsis_sigs[0]
              binary = os.path.basename(sig_path)[:-4]
              platforms['windows-x86_64-nsis'] = {
                  'signature': sig_b64(sig_path),
                  'url': url_for(binary),
              }

          # macOS — one .app.tar.gz.sig per arch. Filenames look like
          # VGC.Reporter_aarch64.app.tar.gz.sig or _x64.app.tar.gz.sig.
          for sig_path in sorted(glob.glob('/tmp/sigs/*.app.tar.gz.sig')):
              binary = os.path.basename(sig_path)[:-4]
              m = re.search(r'_(aarch64|x64)\.app', binary)
              if not m:
                  continue
              arch = 'aarch64' if m.group(1) == 'aarch64' else 'x86_64'
              entry = {'signature': sig_b64(sig_path), 'url': url_for(binary)}
              platforms[f'darwin-{arch}'] = entry
              platforms[f'darwin-{arch}-app'] = entry

          # Linux — AppImage is the default. Add per-format variants too so
          # users on .deb / .rpm distros can opt in.
          appimage_sigs = sorted(glob.glob('/tmp/sigs/*.AppImage.sig'))
          if appimage_sigs:
              sig_path = appimage_sigs[0]
              binary = os.path.basename(sig_path)[:-4]
              entry = {'signature': sig_b64(sig_path), 'url': url_for(binary)}
              platforms['linux-x86_64'] = entry
              platforms['linux-x86_64-appimage'] = entry

          deb_sigs = sorted(glob.glob('/tmp/sigs/*.deb.sig'))
          if deb_sigs:
              sig_path = deb_sigs[0]
              binary = os.path.basename(sig_path)[:-4]
              platforms['linux-x86_64-deb'] = {
                  'signature': sig_b64(sig_path),
                  'url': url_for(binary),
              }

          rpm_sigs = sorted(glob.glob('/tmp/sigs/*.rpm.sig'))
          if rpm_sigs:
              sig_path = rpm_sigs[0]
              binary = os.path.basename(sig_path)[:-4]
              platforms['linux-x86_64-rpm'] = {
                  'signature': sig_b64(sig_path),
                  'url': url_for(binary),
              }

          # Android — only present when the release.yml android job has
          # uploaded the apk.sig (added by this commit). Older releases
          # (v0.2.3 and earlier) won't have it, so the key just won't appear.
          apk_sigs = sorted(glob.glob('/tmp/sigs/*android*.apk.sig'))
          if apk_sigs:
              sig_path = apk_sigs[0]
              binary = os.path.basename(sig_path)[:-4]
              platforms['android'] = {
                  'signature': sig_b64(sig_path),
                  'url': url_for(binary),
              }

          out = {
              'version': version,
              'notes': body,
              'pub_date': pub_date,
              'platforms': platforms,
          }

          with open('/tmp/latest.json', 'w') as f:
              json.dump(out, f, indent=2)

          print(f'latest.json built — platforms: {sorted(platforms.keys())}')
          if not platforms:
              raise SystemExit('No platform .sig files found — refusing to upload an empty latest.json')
          PY

          echo "--- generated latest.json ---"
          cat /tmp/latest.json

      - name: Upload latest.json to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.inputs.tag }}
        run: |
          gh release upload "$TAG" /tmp/latest.json --clobber
          echo "✓ Uploaded latest.json to release $TAG"
