name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to (re)release, e.g. v0.2.2.20260517-beta. Required for workflow_dispatch.'
        required: true

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      body: ${{ steps.notes.outputs.body }}
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve tag (push → ref_name, dispatch → input)
        id: resolve
        env:
          REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="$REF_NAME"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $TAG"

      - name: Generate release body from git log
        id: notes
        env:
          TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          PREV_TAG=$(git for-each-ref --sort=-creatordate --format='%(refname:short)' refs/tags \
            | grep -E '^v[0-9]' | grep -v "^${TAG}$" | head -1 || true)
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${TAG}"
          else
            RANGE="$TAG"
          fi
          echo "Range: $RANGE"

          clean_subject() {
            local s="$1"
            s=$(echo "$s" | sed -E 's/^\[[^]]+\][[:space:]]*//')
            local first rest
            first=$(printf '%s' "${s:0:1}" | tr '[:lower:]' '[:upper:]')
            rest="${s:1}"
            printf '%s%s' "$first" "$rest"
          }

          CHANGES=""
          FIXES=""
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            case "$line" in
              \[release\]*|\[ci\]*) continue ;;
            esac
            is_fix=0
            if echo "$line" | grep -iqE '\bfix(es|ed)?\b|\bbug\b|\bhotfix\b|\bresolve[sd]?\b'; then
              is_fix=1
            fi
            cleaned=$(clean_subject "$line")
            if [ "$is_fix" -eq 1 ]; then
              FIXES="${FIXES}- ${cleaned}"$'\n'
            else
              CHANGES="${CHANGES}- ${cleaned}"$'\n'
            fi
          done < <(git log --pretty='%s' "$RANGE")

          BODY=""
          if [ -n "$CHANGES" ]; then
            BODY="## Changes"$'\n\n'"${CHANGES}"$'\n'
          fi
          if [ -n "$FIXES" ]; then
            BODY="${BODY}## Fixes"$'\n\n'"${FIXES}"
          fi
          if [ -z "$BODY" ]; then
            BODY="## Changes"$'\n\n'"- ${TAG} release"$'\n'
          fi

          DELIM="EOF_$(openssl rand -hex 8)"
          {
            echo "body<<${DELIM}"
            printf '%s' "$BODY"
            echo
            echo "${DELIM}"
          } >> "$GITHUB_OUTPUT"

          echo "----- generated body -----"
          printf '%s' "$BODY"
          echo "--------------------------"

  # Single-runner job that creates (or reuses) the draft release BEFORE any
  # matrix build kicks off. Eliminates the race condition where the four
  # parallel `build` jobs each tried to create the same draft via tauri-action
  # and one of them silently hung after "Looking for a draft release with
  # tag ..." (observed on the v0.2.2 Windows job — log truncated, no error,
  # job marked failed). Subsequent build jobs just upload assets to the
  # release id this step produces.
  create-release:
    needs: prepare
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.upsert.outputs.release_id }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Upsert draft release
        id: upsert
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
          BODY: ${{ needs.prepare.outputs.body }}
        run: |
          set -e
          # Reuse the draft if one already exists for this tag (e.g. a retry
          # of a previously failed run). Match by tag; we don't care whether
          # it's draft or published — `gh release view` returns the id in
          # either case.
          existing=$(gh release view "$TAG" --json id --jq '.id' 2>/dev/null || true)
          if [ -n "$existing" ]; then
            echo "Reusing existing release id=$existing for tag $TAG"
          else
            # Write the multi-line body to a file so newlines survive the env
            # → CLI hop (gh release create --notes does not love embedded \n).
            printf '%s' "$BODY" > /tmp/release-body.md
            gh release create "$TAG" \
              --title "VGC Reporter $TAG" \
              --notes-file /tmp/release-body.md \
              --draft
            existing=$(gh release view "$TAG" --json id --jq '.id')
            echo "Created new draft release id=$existing for tag $TAG"
          fi
          echo "release_id=$existing" >> "$GITHUB_OUTPUT"

  build:
    needs: [prepare, create-release]
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-2025
            args: ''
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Cargo registry & target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ matrix.platform }}-cargo-${{ hashFiles('src-tauri/Cargo.toml') }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev librsvg2-dev patchelf libayatana-appindicator3-dev xdg-utils

      - name: Install dependencies (Bun)
        run: bun install --frozen-lockfile

      - name: Build & upload to draft release with tauri-action
        uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: "bunx tauri"
          projectPath: "."
          # releaseId targets the draft created by the create-release job.
          # Skips tauri-action's own create-or-find logic which races when
          # four matrix jobs hit it at once.
          releaseId: ${{ needs.create-release.outputs.release_id }}
          includeUpdaterJson: true
          updaterJsonPreferNsis: false
          args: ${{ matrix.args }}

  android:
    runs-on: ubuntu-latest
    # Depends on `prepare` for outputs.tag (works on both tag push and
    # workflow_dispatch) and on `build` so the desktop bundles land in the
    # draft before the APK joins them.
    needs: [prepare, build]
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v5
        with:
          # On workflow_dispatch checkout would default to main HEAD; force
          # the tag's commit so the APK matches the release.
          ref: ${{ needs.prepare.outputs.tag }}

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK 25
        run: sdkmanager "ndk;25.2.9519653"

      - name: Set NDK_HOME
        run: echo "NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Cargo registry & target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: android-cargo-${{ hashFiles('src-tauri/Cargo.toml') }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies (Bun)
        run: bun install --frozen-lockfile

      - name: Build Android APK
        run: bunx tauri android build --apk

      - name: Sign APK
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks
          BUILD_TOOLS=$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)
          $BUILD_TOOLS/apksigner sign \
            --ks keystore.jks \
            --ks-key-alias "${{ secrets.ANDROID_KEY_ALIAS }}" \
            --ks-pass "pass:${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            --key-pass "pass:${{ secrets.ANDROID_KEY_PASSWORD }}" \
            --out VGC.Reporter_${{ needs.prepare.outputs.tag }}_android.apk \
            src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk

      - name: Upload APK to GitHub release
        run: |
          for i in 1 2 3 4 5; do
            if gh release upload "${{ needs.prepare.outputs.tag }}" "VGC.Reporter_${{ needs.prepare.outputs.tag }}_android.apk" --clobber; then
              echo "APK uploaded"
              break
            fi
            echo "Retry $i/5 in 30s..."
            sleep 30
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign APK for Tauri updater (minisign)
        env:
          PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          SIGNED_APK="VGC.Reporter_${{ needs.prepare.outputs.tag }}_android.apk"
          bunx tauri signer sign -k "$PRIVATE_KEY" -p "$PRIVATE_KEY_PASSWORD" "$SIGNED_APK"

      - name: Inject Android platform into latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          SIGNED_APK="VGC.Reporter_${TAG}_android.apk"
          APK_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${SIGNED_APK}"
          for i in 1 2 3 4 5; do
            if gh release download "$TAG" --pattern "latest.json" --output latest.json 2>/dev/null; then
              echo "latest.json downloaded"
              break
            fi
            echo "Retry $i/5 in 30s..."
            sleep 30
          done
          python3 -c "import json,sys; d=json.load(open('latest.json')); d['platforms']['android']={'signature':open(sys.argv[1]+'.sig').read().strip(),'url':sys.argv[2]}; json.dump(d,open('latest.json','w'),indent=2)" "$SIGNED_APK" "$APK_URL"
          gh release upload "$TAG" latest.json --clobber
