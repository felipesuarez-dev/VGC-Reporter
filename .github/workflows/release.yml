name: Release Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to (re)release, e.g. v0.2.2.20260517-beta. Required for workflow_dispatch.'
        required: true

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      body: ${{ steps.notes.outputs.body }}
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve tag (push → ref_name, dispatch → input)
        id: resolve
        env:
          REF_NAME: ${{ github.ref_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="$REF_NAME"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $TAG"

      - name: Generate release body from git log
        id: notes
        env:
          TAG: ${{ steps.resolve.outputs.tag }}
        run: |
          PREV_TAG=$(git for-each-ref --sort=-creatordate --format='%(refname:short)' refs/tags \
            | grep -E '^v[0-9]' | grep -v "^${TAG}$" | head -1 || true)
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${TAG}"
          else
            RANGE="$TAG"
          fi
          echo "Range: $RANGE"

          clean_subject() {
            local s="$1"
            s=$(echo "$s" | sed -E 's/^\[[^]]+\][[:space:]]*//')
            local first rest
            first=$(printf '%s' "${s:0:1}" | tr '[:lower:]' '[:upper:]')
            rest="${s:1}"
            printf '%s%s' "$first" "$rest"
          }

          CHANGES=""
          FIXES=""
          while IFS= read -r line; do
            [ -z "$line" ] && continue
            case "$line" in
              \[release\]*|\[ci\]*) continue ;;
            esac
            is_fix=0
            if echo "$line" | grep -iqE '\bfix(es|ed)?\b|\bbug\b|\bhotfix\b|\bresolve[sd]?\b'; then
              is_fix=1
            fi
            cleaned=$(clean_subject "$line")
            if [ "$is_fix" -eq 1 ]; then
              FIXES="${FIXES}- ${cleaned}"$'\n'
            else
              CHANGES="${CHANGES}- ${cleaned}"$'\n'
            fi
          done < <(git log --pretty='%s' "$RANGE")

          BODY=""
          if [ -n "$CHANGES" ]; then
            BODY="## Changes"$'\n\n'"${CHANGES}"$'\n'
          fi
          if [ -n "$FIXES" ]; then
            BODY="${BODY}## Fixes"$'\n\n'"${FIXES}"
          fi
          if [ -z "$BODY" ]; then
            BODY="## Changes"$'\n\n'"- ${TAG} release"$'\n'
          fi

          DELIM="EOF_$(openssl rand -hex 8)"
          {
            echo "body<<${DELIM}"
            printf '%s' "$BODY"
            echo
            echo "${DELIM}"
          } >> "$GITHUB_OUTPUT"

          echo "----- generated body -----"
          printf '%s' "$BODY"
          echo "--------------------------"

  # Single-runner job that creates (or reuses) the draft release BEFORE any
  # matrix build kicks off. Eliminates the race condition where the four
  # parallel `build` jobs each tried to create the same draft via tauri-action
  # and one of them silently hung after "Looking for a draft release with
  # tag ..." (observed on the v0.2.2 Windows job — log truncated, no error,
  # job marked failed). Subsequent build jobs just upload assets to the
  # release id this step produces.
  create-release:
    needs: prepare
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.upsert.outputs.release_id }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Upsert draft release
        id: upsert
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
          BODY: ${{ needs.prepare.outputs.body }}
        run: |
          set -e
          # Reuse the draft if one already exists for this tag (e.g. a retry
          # of a previously failed run). Match by tag; we don't care whether
          # it's draft or published — `gh release view` returns the id in
          # either case.
          existing=$(gh release view "$TAG" --json id --jq '.id' 2>/dev/null || true)
          if [ -n "$existing" ]; then
            echo "Reusing existing release id=$existing for tag $TAG"
          else
            # Write the multi-line body to a file so newlines survive the env
            # → CLI hop (gh release create --notes does not love embedded \n).
            printf '%s' "$BODY" > /tmp/release-body.md
            gh release create "$TAG" \
              --title "VGC Reporter $TAG" \
              --notes-file /tmp/release-body.md \
              --draft
            existing=$(gh release view "$TAG" --json id --jq '.id')
            echo "Created new draft release id=$existing for tag $TAG"
          fi
          echo "release_id=$existing" >> "$GITHUB_OUTPUT"

  build:
    needs: [prepare, create-release]
    strategy:
      fail-fast: false
      # max-parallel: 1 serializes the 4 platform jobs. tauri-action's
      # latest.json update is read-modify-write: it downloads the existing
      # JSON, adds its platform key, uploads back. Parallel matrix jobs race
      # there (last writer wins, earlier platforms drop out — that's how the
      # v0.2.2 latest.json ended up missing windows-x86_64). Running one at
      # a time guarantees each platform's key sticks. Cost: ~4x slower total
      # wall time, ~40min instead of ~12min. Worth it for release reliability.
      max-parallel: 1
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ''
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: windows-2025
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Cargo registry & target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ matrix.platform }}-cargo-${{ hashFiles('src-tauri/Cargo.toml') }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev librsvg2-dev patchelf libayatana-appindicator3-dev xdg-utils

      - name: Install dependencies (Bun)
        run: bun install --frozen-lockfile

      # Windows Authenticode signing MUST happen IN-BUILD (not after
      # tauri-action), because createUpdaterArtifacts generates the minisign
      # .sig over the final bytes — signing the binary afterwards would
      # invalidate every updater signature. We feed Tauri a `--config` overlay
      # with the imported cert thumbprint so the bundler signs the MSI/NSIS and
      # THEN computes the .sig. If the cert secret is absent the build proceeds
      # UNSIGNED (no failure) — self-signed today, swap the secret for a real
      # CA cert later with no workflow change. signtool ships with the Windows
      # SDK on the runner (no node/npx → Bun-only stays intact).
      - name: Prepare Windows code signing
        id: winsign
        if: matrix.platform == 'windows-2025'
        shell: pwsh
        env:
          WINDOWS_CERT_PFX_BASE64: ${{ secrets.WINDOWS_CERT_PFX_BASE64 }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          if (-not $env:WINDOWS_CERT_PFX_BASE64) {
            Write-Host "::warning::WINDOWS_CERT_PFX_BASE64 not set — building UNSIGNED Windows bundles."
            "config_arg=" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            exit 0
          }
          $pfx = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_CERT_PFX_BASE64))
          $sec = ConvertTo-SecureString $env:WINDOWS_CERT_PASSWORD -AsPlainText -Force
          $cert = Import-PfxCertificate -FilePath $pfx -CertStoreLocation Cert:\CurrentUser\My -Password $sec
          Write-Host "Imported signing cert, thumbprint $($cert.Thumbprint)"
          $cfg = @{ bundle = @{ windows = @{ certificateThumbprint = $cert.Thumbprint; digestAlgorithm = "sha256"; timestampUrl = "http://timestamp.digicert.com" } } } | ConvertTo-Json -Depth 6 -Compress
          $cfgPath = Join-Path $env:RUNNER_TEMP "winsign.conf.json"
          [IO.File]::WriteAllText($cfgPath, $cfg)
          "config_arg=--config $cfgPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build & upload to draft release with tauri-action
        id: tauri
        uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: "bunx tauri"
          projectPath: "."
          # releaseId targets the draft created by the create-release job.
          # Skips tauri-action's own create-or-find logic which raced when
          # four matrix jobs hit it at once on v0.2.1/v0.2.2.
          releaseId: ${{ needs.create-release.outputs.release_id }}
          includeUpdaterJson: true
          updaterJsonPreferNsis: false
          retryAttempts: 3
          args: ${{ matrix.args }} ${{ steps.winsign.outputs.config_arg }}

      # Defensive belt-and-suspenders for the Windows MSI / NSIS upload —
      # tauri-action v0.6 reported success for the v0.2.2 Windows job but the
      # bundles never appeared on the release (likely a sig-priority matching
      # quirk or a silently swallowed upload error). Re-upload every bundle
      # this platform produced with --clobber so the release always ends up
      # with the expected set even if tauri-action's per-job upload misses
      # something. paths from src-tauri/target/.../release/bundle/ map to:
      #   windows: msi/*.msi(.sig), nsis/*-setup.exe(.sig), zips
      #   macos:   dmg/*.dmg(.sig), macos/*.app.tar.gz(.sig)
      #   linux:   deb/*.deb(.sig), rpm/*.rpm(.sig), appimage/*.AppImage(.sig)
      - name: Re-upload platform bundles (defensive)
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -e
          BUNDLE_DIRS=$(find src-tauri/target -type d -name bundle | head -5)
          echo "Bundle dirs found: $BUNDLE_DIRS"
          for bdir in $BUNDLE_DIRS; do
            find "$bdir" -type f \( \
              -name '*.msi' -o -name '*.msi.sig' -o -name '*.msi.zip' -o -name '*.msi.zip.sig' \
              -o -name '*-setup.exe' -o -name '*-setup.exe.sig' \
              -o -name '*-setup.nsis.zip' -o -name '*-setup.nsis.zip.sig' \
              -o -name '*.dmg' -o -name '*.dmg.sig' \
              -o -name '*.app.tar.gz' -o -name '*.app.tar.gz.sig' \
              -o -name '*.deb' -o -name '*.deb.sig' \
              -o -name '*.rpm' -o -name '*.rpm.sig' \
              -o -name '*.AppImage' -o -name '*.AppImage.sig' \
            \) -print0 | while IFS= read -r -d '' f; do
              echo "Uploading: $f"
              gh release upload "$TAG" "$f" --clobber || echo "  (upload failed, continuing)"
            done
          done

  android:
    runs-on: ubuntu-latest
    # Depends on `prepare` for outputs.tag (works on both tag push and
    # workflow_dispatch) and on `build` so the desktop bundles land in the
    # draft before the APK joins them.
    needs: [prepare, build]
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v5
        with:
          # On workflow_dispatch checkout would default to main HEAD; force
          # the tag's commit so the APK matches the release.
          ref: ${{ needs.prepare.outputs.tag }}

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK 25
        run: sdkmanager "ndk;25.2.9519653"

      - name: Set NDK_HOME
        run: echo "NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Cargo registry & target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: android-cargo-${{ hashFiles('src-tauri/Cargo.toml') }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies (Bun)
        run: bun install --frozen-lockfile

      - name: Build Android APK
        run: bunx tauri android build --apk

      - name: Sign APK
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks
          BUILD_TOOLS=$ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)
          $BUILD_TOOLS/apksigner sign \
            --ks keystore.jks \
            --ks-key-alias "${{ secrets.ANDROID_KEY_ALIAS }}" \
            --ks-pass "pass:${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            --key-pass "pass:${{ secrets.ANDROID_KEY_PASSWORD }}" \
            --out VGC.Reporter_${{ needs.prepare.outputs.tag }}_android.apk \
            src-tauri/gen/android/app/build/outputs/apk/universal/release/app-universal-release-unsigned.apk

      - name: Upload APK to GitHub release
        run: |
          for i in 1 2 3 4 5; do
            if gh release upload "${{ needs.prepare.outputs.tag }}" "VGC.Reporter_${{ needs.prepare.outputs.tag }}_android.apk" --clobber; then
              echo "APK uploaded"
              break
            fi
            echo "Retry $i/5 in 30s..."
            sleep 30
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign APK for Tauri updater (minisign)
        env:
          PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          SIGNED_APK="VGC.Reporter_${TAG}_android.apk"
          bunx tauri signer sign -k "$PRIVATE_KEY" -p "$PRIVATE_KEY_PASSWORD" "$SIGNED_APK"
          # Upload the minisign .sig to the release alongside the apk so the
          # regenerate-latest-json recovery workflow can rebuild platforms.android
          # without re-running this job. (Without this, the .sig dies with the
          # runner and the only way to put android in latest.json is to inject
          # it inline in the step below.)
          gh release upload "$TAG" "${SIGNED_APK}.sig" --clobber

      - name: Inject Android platform into latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          SIGNED_APK="VGC.Reporter_${TAG}_android.apk"
          APK_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${SIGNED_APK}"
          # Try to fetch the latest.json that tauri-action's build matrix
          # *should* have uploaded. If it's missing (observed on v0.2.3 when
          # tauri-action v0.6 silently skipped updater JSON upload across all
          # 4 matrix jobs), generate a minimal android-only one — the
          # regenerate-latest-json workflow can be triggered afterwards to
          # add the desktop platform keys.
          for i in 1 2 3 4 5; do
            if gh release download "$TAG" --pattern "latest.json" --output latest.json 2>/dev/null; then
              echo "latest.json downloaded"
              break
            fi
            echo "Retry $i/5 in 30s..."
            sleep 30
          done
          if [ ! -f latest.json ]; then
            echo "latest.json not present on release; bootstrapping a fresh one"
            VERSION="${TAG#v}"
            SEMVER=$(echo "$VERSION" | grep -oE '^[0-9]+\.[0-9]+\.[0-9]+')
            python3 -c "import json; json.dump({'version': '${SEMVER}', 'notes': '', 'pub_date': __import__('datetime').datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%S.000Z'), 'platforms': {}}, open('latest.json','w'), indent=2)"
          fi
          python3 -c "import json,sys; d=json.load(open('latest.json')); d['platforms']['android']={'signature':open(sys.argv[1]+'.sig').read().strip(),'url':sys.argv[2]}; json.dump(d,open('latest.json','w'),indent=2)" "$SIGNED_APK" "$APK_URL"
          gh release upload "$TAG" latest.json --clobber
